name: Cross Platform Release

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
            artifact_name: pb-safety-linux-x64-release
            package_file: pb-safety-linux-x64-release.zip
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            artifact_name: pb-safety-linux-arm64-release
            package_file: pb-safety-linux-arm64-release.zip
          - os: macos-14
            platform: macos
            host: mac
            arch: clang_64
            artifact_name: pb-safety-macos-release
          - os: windows-2022
            platform: windows
            host: windows
            arch: win64_mingw
            artifact_name: pb-safety-windows-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ccache (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.platform }}-${{ github.ref_name }}-${{ hashFiles('CMakeLists.txt', '**/*.h', '**/*.cpp', '**/*.ui') }}
          restore-keys: |
            ccache-${{ matrix.platform }}-${{ github.ref_name }}-
            ccache-${{ matrix.platform }}-

      - name: Install Qt (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            qtbase5-dev \
            ninja-build \
            zip \
            ccache

      - name: Install Qt (macOS/Windows)
        if: runner.os != 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: ${{ matrix.host }}
          target: desktop
          arch: ${{ matrix.arch }}
          cache: true

      - name: Configure & Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ccache --max-size=500M
          ccache --show-stats
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DQT_DEFAULT_MAJOR_VERSION=5 -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --parallel
          ccache --show-stats

      - name: Configure & Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p package/pb-safety
          cp build/pb-safety package/pb-safety/
          cp start.sh package/pb-safety/
          cp install_redos_shortcut.sh package/pb-safety/
          cp PVB_DB.db package/pb-safety/
          chmod +x package/pb-safety/pb-safety package/pb-safety/start.sh package/pb-safety/install_redos_shortcut.sh
          (
            cd package
            zip -r ../${{ matrix.package_file }} pb-safety
          )

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p package
          cp -R build/pb-safety.app package/
          macdeployqt package/pb-safety.app
          ditto -c -k --sequesterRsrc --keepParent package/pb-safety.app pb-safety-macos-release.zip

      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force | Out-Null
          $exe = Get-ChildItem -Path build -Recurse -Filter pb-safety.exe | Select-Object -First 1
          if (-not $exe) {
            throw "pb-safety.exe not found in build output"
          }
          Copy-Item $exe.FullName package\pb-safety.exe
          windeployqt package\pb-safety.exe
          Compress-Archive -Path package\* -DestinationPath pb-safety-windows-release.zip -Force

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_file }}

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: pb-safety-macos-release.zip

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: pb-safety-windows-release.zip
